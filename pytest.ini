[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    network: test makes real network calls; skips gracefully when offline
    slow: test takes > 10s (FinBERT, model training, etc.)
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
addopts = -ra --strict-markers
